{% extends "base.html" %}
{% load static %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h2 class="mb-4">Dashboard</h2>

<div class="row">

        <div class="card text-center p-3">
            <h6>Tổng thu nhập</h6>
            <h3>$2450</h3>

        <div class="card text-center p-3">

{% block extra_js %}

<script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
