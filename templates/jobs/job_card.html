<div class="card mb-3 h-100">
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">
            <a href="{% url 'job_detail' job.id %}" class="text-decoration-none fw-bold">
                {{ job.title }}
            </a>
        </h5>

        <p class="text-muted small mb-3">
            <img src="{{ job.client_avatar }}" width="25" height="25" class="rounded-circle me-1"
                style="object-fit: cover;">
            {{ job.client_name }} • {{ job.created_at|timesince }} trước
        </p>

        <div class="card-text text-muted mb-4 flex-grow-1" style="min-height: 50px;">
            {{ job.description|safe|truncatewords:20 }}
        </div>

        <div class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top">
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-secondary opacity-75">
                    {{ job.category }}
                </span>
                <span class="fw-bold text-success fs-5">
                    ${{ job.budget }}
                </span>
            </div>

            <a href="{% url 'job_detail' job.id %}" class="btn btn-sm btn-primary px-3">
                View
            </a>
        </div>

    </div>
</div>
