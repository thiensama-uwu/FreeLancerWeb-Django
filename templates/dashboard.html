{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container my-4">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white text-center p-4 border-0 shadow">
                <h6 class="opacity-75">Tổng thu nhập</h6>
                <h2 class="fw-bold">$2,450.00</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white text-center p-4 border-0 shadow">
                <h6 class="opacity-75">Dự án hoàn thành</h6>
                <h2 class="fw-bold">12</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark text-center p-4 border-0 shadow">
                <h6 class="opacity-75">Đang thực hiện</h6>
                <h2 class="fw-bold">3</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="card border-0 shadow p-4">
                <h5 class="card-title mb-4">Thống kê thu nhập 6 tháng qua</h5>
                <canvas id="incomeChart" height="150"></canvas>
            </div>
        </div>
        <div class="col-lg-4 mb-4">
            <div class="card border-0 shadow p-4">
                <h5 class="card-title mb-4">Kỹ năng phổ biến</h5>
                <canvas id="skillChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Biểu đồ thu nhập (Line Chart)
    const ctxIncome = document.getElementById('incomeChart').getContext('2d');
    new Chart(ctxIncome, {
        type: 'line',
        data: {
            labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6'],
            datasets: [{
                label: 'Thu nhập ($)',
                data: [400, 700, 550, 900, 1100, 850],
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });

    // Biểu đồ kỹ năng (Doughnut Chart)
    const ctxSkill = document.getElementById('skillChart').getContext('2d');
    new Chart(ctxSkill, {
        type: 'doughnut',
        data: {
            labels: ['Python', 'Web Design', 'SEO'],
            datasets: [{
                data: [60, 25, 15],
                backgroundColor: ['#0d6efd', '#198754', '#ffc107'],
                borderWidth: 0
            }]
        }
    });
</script>
